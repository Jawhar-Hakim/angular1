<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
      <mat-card-subtitle>Enter your credentials to access your account</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput placeholder="Ex. pat@example.com" type="email" name="email" [(ngModel)]="email" required>
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput placeholder="Enter your password" type="password" name="password" [(ngModel)]="password" required>
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="full-width login-button">
          SIGN IN
        </button>
      </form>
    </mat-card-content>
    <mat-card-footer>
      <p class="footer-text">Don't have an account? <a href="#">Contact admin</a></p>
    </mat-card-footer>
  </mat-card>
</div>
